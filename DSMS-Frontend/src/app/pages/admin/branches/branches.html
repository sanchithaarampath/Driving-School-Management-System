<div class="dsms-layout">
  <app-sidebar></app-sidebar>
  <div class="main-content">
    <app-topbar></app-topbar>
    <div class="page-content">

      <div class="page-header">
        <div>
          <h2>Branch Management</h2>
          <p>Manage all driving school branches</p>
        </div>
        <button class="btn btn-primary" (click)="openForm()">
          <i class="bi bi-plus-lg me-2"></i>Add Branch
        </button>
      </div>

      <div *ngIf="successMessage" class="alert alert-success">
        <i class="bi bi-check-circle me-2"></i>{{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="alert alert-danger">
        <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
      </div>

      <!-- Add / Edit Form -->
      <div class="form-card" *ngIf="showForm">
        <h6 class="section-title">
          <i class="bi bi-building me-2"></i>{{ editId ? 'Edit Branch' : 'New Branch' }}
        </h6>
        <div class="form-grid">
          <div class="form-group">
            <label>Branch Name <span class="required">*</span></label>
            <input type="text" class="form-control" [(ngModel)]="form.name" placeholder="e.g. Colombo Main Branch">
          </div>
          <div class="form-group">
            <label>Branch Code <span class="required">*</span></label>
            <input type="text" class="form-control" [(ngModel)]="form.code" placeholder="e.g. COL01">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" class="form-control" [(ngModel)]="form.phone" placeholder="07XXXXXXXX">
          </div>
          <div class="form-group full-width">
            <label>Address</label>
            <textarea class="form-control" [(ngModel)]="form.address" rows="2"
                      placeholder="Branch address"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-cancel" (click)="cancel()" [disabled]="isSaving">Cancel</button>
          <button class="btn btn-primary" (click)="save()" [disabled]="isSaving">
            <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
            <i *ngIf="!isSaving" class="bi bi-check-lg me-2"></i>
            {{ isSaving ? 'Saving...' : (editId ? 'Update Branch' : 'Create Branch') }}
          </button>
        </div>
      </div>

      <!-- Loading -->
      <div *ngIf="isLoading" class="loading-state">
        <div class="spinner-border text-danger"></div>
        <p>Loading branches...</p>
      </div>

      <!-- Empty -->
      <div *ngIf="!isLoading && branches.length === 0" class="empty-state">
        <i class="bi bi-building"></i>
        <p>No branches yet. Add your first branch.</p>
        <button class="btn btn-primary" (click)="openForm()">Add Branch</button>
      </div>

      <!-- Card Grid -->
      <div *ngIf="!isLoading && branches.length > 0" class="branches-grid">
        <div class="branch-card" *ngFor="let b of branches">

          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem;">
            <div class="branch-name"><i class="bi bi-building me-2"></i>{{ b.name }}</div>
            <span class="branch-code">{{ b.code }}</span>
          </div>

          <div class="branch-detail" *ngIf="b.phone">
            <i class="bi bi-telephone"></i>{{ b.phone }}
          </div>
          <div class="branch-detail" *ngIf="b.address">
            <i class="bi bi-geo-alt"></i>{{ b.address }}
          </div>

          <div class="branch-actions">
            <button class="btn-action edit" title="Edit Branch" (click)="openForm(b)">
              <i class="bi bi-pencil"></i>
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
